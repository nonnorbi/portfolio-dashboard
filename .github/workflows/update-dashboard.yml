name: Update Portfolio Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
      - env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scripts/update_portfolio_data.py
      - run: |
          git config --global user.name 'Portfolio Bot'
          git config --global user.email 'bot@portfolio.local'
          git add public/portfolio_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update portfolio data [skip ci]" && git push )
      - run: |
          npm install --legacy-peer-deps
          npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
